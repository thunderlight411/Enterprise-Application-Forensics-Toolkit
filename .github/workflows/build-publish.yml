name: Build and Publish

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch: {}

jobs:
  build:
    name: Build Python package
    runs-on: ubuntu-latest
    env:
      VERSION: 0.0.${{ github.run_number }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build tomli_w

      - name: Set dynamic version
        run: |
          python - <<'PY'
          import os
          from pathlib import Path
          import tomllib
          import tomli_w

          pyproject = Path('pyproject.toml')
          config = tomllib.loads(pyproject.read_text())
          config['project']['version'] = os.environ['VERSION']
          pyproject.write_text(tomli_w.dumps(config))
          PY

      - name: Build distribution artifacts
        run: |
          python -m build --sdist --wheel

      - name: Upload Python dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*

  build-windows-exe:
    name: Build Windows executable
    runs-on: windows-latest
    env:
      VERSION: 0.0.${{ github.run_number }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller

      - name: Build executable
        run: |
          pyinstaller --onefile --name toolkit-${{ env.VERSION }} toolkit/cli.py

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/toolkit-${{ env.VERSION }}.exe

  release:
    name: Publish GitHub release assets
    runs-on: ubuntu-latest
    needs: [build, build-windows-exe]
    env:
      VERSION: 0.0.${{ github.run_number }}

    steps:
      - name: Download Python distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Download Windows executable artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: dist

      - name: Create GitHub release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ env.VERSION }}
          name: CI Build ${{ env.VERSION }}
          body: "Automated CI build release for version ${{ env.VERSION }}"
          files: |
            dist/*.tar.gz
            dist/*.whl
            dist/toolkit-${{ env.VERSION }}.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
