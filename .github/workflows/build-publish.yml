name: Build and Publish

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch: {}

jobs:
  build:
    name: Build Python package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build distribution artifacts
        run: |
          python -m build --sdist --wheel

      - name: Upload Python dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*

  build-windows-exe:
    name: Build Windows executable
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build pyinstaller

      - name: Build executable
        run: |
          pyinstaller --onefile --name toolkit toolkit/cli.py

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/toolkit.exe

  release:
    name: Publish GitHub release assets
    runs-on: ubuntu-latest
    needs: [build, build-windows-exe]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download Python distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Download Windows executable artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: dist

      - name: Create GitHub release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: "Automated package build for tag ${{ github.ref_name }}"
          files: |
            dist/*.tar.gz
            dist/*.whl
            dist/toolkit.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
