name: Build and Publish

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch: {}

jobs:
  build-windows-exe:
    name: Build Windows executable
    runs-on: windows-latest
    env:
      VERSION: 0.0.${{ github.run_number }}

  build-cpp-windows:
    name: Build C++ Windows executable
    runs-on: windows-latest
    env:
      VERSION: 0.0.${{ github.run_number }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Configure C++ project
        run: cmake -S cpp -B cpp/build -A x64

      - name: Build C++ executable
        run: cmake --build cpp/build --config Release

      - name: Stage versioned C++ executable
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item cpp/build/Release/eaftoolkit.exe dist/eaftoolkit-${{ env.VERSION }}-windows-x64.exe

      - name: Upload C++ executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: cpp-windows-exe
          path: dist/eaftoolkit-${{ env.VERSION }}-windows-x64.exe

  release:
    name: Publish GitHub release assets
    runs-on: ubuntu-latest
    needs: [build-windows-exe, build-cpp-windows]
    env:
      VERSION: 0.0.${{ github.run_number }}

    steps:
      - name: Download C++ executable artifact
        uses: actions/download-artifact@v4
        with:
          name: cpp-windows-exe
          path: dist

      - name: Create GitHub release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ env.VERSION }}
          name: CI Build ${{ env.VERSION }}
          body: "Automated CI build release for version ${{ env.VERSION }}"
          files: |
            dist/*.tar.gz
            dist/*.whl
            dist/toolkit-${{ env.VERSION }}.exe
            dist/eaftoolkit-${{ env.VERSION }}-windows-x64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
